<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loca</title>
<style>
:root {
  --bg:         #111111;
  --surface:    #181818;
  --border:     #262626;
  --text:       #e2e2e2;
  --text-dim:   #606060;
  --accent:     #4f8ef7;
  --user-bg:    #1b2840;
  --user-border:#2d4270;
  --code-bg:    #0d1117;
  --error:      #c0392b;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
  font-size: 14px;
  line-height: 1.6;
}

body { display: flex; flex-direction: column; overflow: hidden; }

/* ── Header ─────────────────────────────────────────────────────────────── */
#header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  -webkit-app-region: drag;        /* draggable titlebar area in macOS WKWebView */
}

#header > * { -webkit-app-region: no-drag; }

#logo { font-weight: 700; font-size: 15px; color: var(--text); flex: 1; }

#model-select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 13px;
  cursor: pointer;
  outline: none;
  min-width: 90px;
}
#model-select:focus { border-color: var(--accent); }

#ctx-display {
  font-size: 12px;
  color: var(--text-dim);
  min-width: 72px;
  text-align: right;
}

#new-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
}
#new-btn:hover { border-color: #444; color: var(--text); }

/* ── Messages ───────────────────────────────────────────────────────────── */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 20px 16px 8px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

#messages::-webkit-scrollbar        { width: 5px; }
#messages::-webkit-scrollbar-track  { background: transparent; }
#messages::-webkit-scrollbar-thumb  { background: #2a2a2a; border-radius: 3px; }

/* Empty state */
#empty {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  gap: 10px;
  pointer-events: none;
}
#empty .icon { font-size: 44px; opacity: .5; }
#empty p { font-size: 13px; }

/* Message rows */
.msg { display: flex; flex-direction: column; max-width: 820px; width: 100%; }
.msg.user { align-self: flex-end; max-width: 620px; }
.msg.assistant { align-self: flex-start; }

.bubble {
  padding: 10px 14px;
  border-radius: 10px;
  word-break: break-word;
}

.user .bubble {
  background: var(--user-bg);
  border: 1px solid var(--user-border);
  border-bottom-right-radius: 3px;
}

.assistant .bubble {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 3px;
}

.meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 5px;
  font-size: 11px;
  color: var(--text-dim);
}
.msg.user .meta { justify-content: flex-end; }

.tag {
  background: #222;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px 6px;
  font-size: 10px;
  color: #777;
}

/* Typing dots */
.dots { display: inline-flex; gap: 4px; align-items: center; padding: 2px 0; }
.dots span {
  width: 7px; height: 7px;
  background: #444; border-radius: 50%;
  animation: pulse 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes pulse {
  0%,60%,100% { opacity:.25; transform:scale(.8); }
  30%          { opacity:1;   transform:scale(1);  }
}

/* Rendered content */
.bubble p  { margin: 0; }
.bubble p + p { margin-top: 8px; }

.bubble pre {
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  overflow-x: auto;
  margin: 10px 0;
  font-family: "SF Mono", "Fira Code", "Menlo", monospace;
  font-size: 12.5px;
  line-height: 1.5;
}
.bubble code {
  font-family: "SF Mono", "Fira Code", "Menlo", monospace;
  font-size: 12.5px;
  background: #1e1e1e;
  padding: 1px 5px;
  border-radius: 3px;
}
.bubble pre code { background: none; padding: 0; }

.bubble strong { font-weight: 600; }
.bubble em { font-style: italic; }

.bubble ul, .bubble ol { padding-left: 20px; margin: 6px 0; }
.bubble li { margin: 2px 0; }

.bubble a { color: var(--accent); text-decoration: none; }
.bubble a:hover { text-decoration: underline; }

.bubble hr { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

.bubble h1,.bubble h2,.bubble h3 { margin: 10px 0 4px; font-weight: 600; }
.bubble h1 { font-size: 17px; }
.bubble h2 { font-size: 15px; }
.bubble h3 { font-size: 14px; }

/* ── Input area ──────────────────────────────────────────────────────────── */
#input-wrap {
  padding: 10px 16px 14px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
}

#input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
  max-width: 820px;
  margin: 0 auto;
}

#input {
  flex: 1;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 9px 13px;
  font-size: 14px;
  font-family: inherit;
  line-height: 1.5;
  resize: none;
  min-height: 40px;
  max-height: 160px;
  overflow-y: auto;
  outline: none;
  transition: border-color .15s;
}
#input:focus { border-color: var(--accent); }
#input::placeholder { color: var(--text-dim); }

#send {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 0 16px;
  height: 40px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  flex-shrink: 0;
  transition: background .15s;
}
#send:hover:not(:disabled) { background: #3d7de8; }
#send:disabled { background: #252525; color: #444; cursor: default; }
</style>
</head>
<body>

<div id="header">
  <span id="logo">Loca</span>
  <select id="model-select" title="Select model"></select>
  <span id="ctx-display">0 ctx</span>
  <button id="new-btn" onclick="newConversation()">New chat</button>
</div>

<div id="messages">
  <div id="empty">
    <div class="icon">◈</div>
    <p>Start a conversation</p>
  </div>
</div>

<div id="input-wrap">
  <div id="input-row">
    <textarea id="input" placeholder="Message…" rows="1"></textarea>
    <button id="send" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let history = [];
let ctxTokens = 0;
let streaming = false;

// ── Bootstrap: load model list ───────────────────────────────────────────────
(async () => {
  try {
    const res = await fetch('/v1/models');
    const { data = [] } = await res.json();
    const sel = document.getElementById('model-select');
    sel.innerHTML = data.map(m =>
      `<option value="${esc(m.id)}">${esc(m.id)}</option>`
    ).join('');
  } catch (_) {
    // leave default options if fetch fails
    document.getElementById('model-select').innerHTML =
      ['general','reason','code','write']
        .map(m => `<option value="${m}">${m}</option>`).join('');
  }
})();

// ── Auto-resize textarea ──────────────────────────────────────────────────────
const inputEl = document.getElementById('input');
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!streaming) sendMessage(); }
});

// ── New conversation ──────────────────────────────────────────────────────────
function newConversation() {
  history = [];
  ctxTokens = 0;
  updateCtx();
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `<div id="empty"><div class="icon">◈</div><p>Start a conversation</p></div>`;
}

// ── Send ──────────────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || streaming) return;

  const model = document.getElementById('model-select').value;
  document.getElementById('empty')?.remove();

  history.push({ role: 'user', content: text });
  appendMsg('user', text, model);

  inputEl.value = '';
  inputEl.style.height = 'auto';
  setStreaming(true);

  // Assistant placeholder with typing indicator
  const assistantEl = appendMsg('assistant', null, model);
  const bubble = assistantEl.querySelector('.bubble');
  bubble.innerHTML = '<div class="dots"><span></span><span></span><span></span></div>';

  let full = '';

  try {
    const resp = await fetch('/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model, messages: history, stream: true })
    });

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const raw = line.slice(6).trim();
        if (raw === '[DONE]') continue;
        try {
          const delta = JSON.parse(raw).choices?.[0]?.delta?.content;
          if (delta != null) {
            if (!full) bubble.innerHTML = '';   // clear typing dots on first token
            full += delta;
            bubble.innerHTML = renderMd(full);
            scrollBottom();
          }
        } catch (_) {}
      }
    }

    if (!full) bubble.innerHTML = '<em style="color:#555">No response.</em>';
    else bubble.innerHTML = renderMd(full);

    history.push({ role: 'assistant', content: full });

    // Update token estimate
    const msgTokens = Math.ceil((text.length + full.length) / 4);
    ctxTokens += msgTokens;
    updateCtx();

    // Update meta
    const meta = assistantEl.querySelector('.meta');
    if (meta) meta.innerHTML =
      `<span class="tag">${esc(model)}</span><span>~${Math.ceil(full.length/4)} tok</span>`;

  } catch (err) {
    bubble.innerHTML = `<span style="color:var(--error)">Error: ${esc(err.message)}</span>`;
  }

  setStreaming(false);
  inputEl.focus();
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function appendMsg(role, content, model) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  if (content !== null) bubble.innerHTML = renderMd(content);
  div.appendChild(bubble);

  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = role === 'user'
    ? `<span class="tag">${esc(model)}</span>`
    : `<span style="color:#333">●</span>`;
  div.appendChild(meta);

  msgs.appendChild(div);
  scrollBottom();
  return div;
}

function renderMd(text) {
  // Escape HTML first, then apply markdown patterns
  let s = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Fenced code blocks
  s = s.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code class="lang-${lang}">${code.trimEnd()}</code></pre>`
  );
  // Inline code
  s = s.replace(/`([^`\n]+)`/g, '<code>$1</code>');
  // Bold / italic
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/\*(.+?)\*/g, '<em>$1</em>');
  // Headings
  s = s.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  s = s.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  s = s.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  // Horizontal rule
  s = s.replace(/^---$/gm, '<hr>');
  // Unordered list
  s = s.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  s = s.replace(/(<li>.*<\/li>\n?)+/g, m => `<ul>${m}</ul>`);
  // Ordered list
  s = s.replace(/^\d+\. (.+)$/gm, '<li>$1</li>');
  // Links
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // Paragraphs: double newlines
  s = s.split(/\n{2,}/).map(p => {
    p = p.trim();
    if (!p) return '';
    if (/^<(h[1-3]|ul|ol|pre|hr|li)/.test(p)) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');

  return s;
}

function setStreaming(v) {
  streaming = v;
  document.getElementById('send').disabled = v;
  document.getElementById('model-select').disabled = v;
}

function scrollBottom() {
  const msgs = document.getElementById('messages');
  msgs.scrollTop = msgs.scrollHeight;
}

function updateCtx() {
  const el = document.getElementById('ctx-display');
  el.textContent = ctxTokens >= 1000
    ? `~${(ctxTokens/1000).toFixed(1)}k ctx`
    : `~${ctxTokens} ctx`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
