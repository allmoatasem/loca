name: Release

# Triggered by pushing a tag like v1.0.0
# Builds a signed (ad-hoc) macOS .dmg and attaches it to a GitHub Release.
#
# Requirements for downloaders:
#   - Apple Silicon Mac (M1/M2/M3/M4)
#   - Python 3 (brew install python@3.12 recommended)
#   - For MLX models: pip install mlx-lm
#   - For GGUF models: brew install llama.cpp
#
# Install: open the DMG, drag Loca.app to Applications, launch.

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    name: Build macOS app (Apple Silicon)
    runs-on: macos-14   # arm64 runner — same arch as M-series Macs

    steps:
      - uses: actions/checkout@v4

      # -- 1. Build Swift binary -----------------------------------------------
      - name: Build Swift package (release)
        run: |

          swift build -c release --package-path Loca-SwiftUI

      # -- 2. Assemble .app bundle ---------------------------------------------
      - name: Assemble Loca.app bundle
        run: |
          BUNDLE="Loca.app"
          MACOS="$BUNDLE/Contents/MacOS"
          RESOURCES="$BUNDLE/Contents/Resources"
          mkdir -p "$MACOS" "$RESOURCES"

          # Swift binary
          cp Loca-SwiftUI/.build/release/Loca "$MACOS/Loca"
          chmod +x "$MACOS/Loca"

          # Startup script
          cp start_services.sh "$RESOURCES/start_services.sh"
          chmod +x "$RESOURCES/start_services.sh"

          # Python backend — bundled inside the app so it runs from /Applications
          cp -R src     "$RESOURCES/src"
          cp -R prompts "$RESOURCES/prompts"
          cp requirements.txt "$RESOURCES/requirements.txt"
          cp config.yaml      "$RESOURCES/config.yaml"
          for f in searxng-settings.yml searxng-settings.yaml; do
            [ -f "$f" ] && cp "$f" "$RESOURCES/$f"
          done
          find "$RESOURCES/src" -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

          # Info.plist
          if [ -f "Loca-SwiftUI/Sources/Loca/Info.plist" ]; then
            cp "Loca-SwiftUI/Sources/Loca/Info.plist" "$BUNDLE/Contents/Info.plist"
          else
            printf '%s\n' \
              '<?xml version="1.0" encoding="UTF-8"?>' \
              '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
              '<plist version="1.0"><dict>' \
              '  <key>CFBundleIdentifier</key><string>com.loca.app</string>' \
              '  <key>CFBundleName</key><string>Loca</string>' \
              '  <key>CFBundleExecutable</key><string>Loca</string>' \
              '  <key>CFBundlePackageType</key><string>APPL</string>' \
              '  <key>LSMinimumSystemVersion</key><string>14.0</string>' \
              '  <key>NSHighResolutionCapable</key><true/>' \
              '  <key>LSApplicationCategoryType</key><string>public.app-category.productivity</string>' \
              '</dict></plist>' \
              > "$BUNDLE/Contents/Info.plist"
          fi

          # Ad-hoc signature
          codesign --sign - --force --deep "$BUNDLE"
          echo "Bundle assembled and signed."

      # -- 3. Create DMG -------------------------------------------------------
      - name: Create DMG
        run: |
          STAGING="$(mktemp -d)/Loca"
          mkdir -p "$STAGING"
          cp -r Loca.app "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "Loca" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            -o Loca-macos-arm64.dmg

          echo "Created Loca-macos-arm64.dmg"
          ls -lh Loca-macos-arm64.dmg

      # -- 4. Publish GitHub Release -------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Loca ${{ github.ref_name }}"
          body: |
            ## Loca ${{ github.ref_name }}

            ### Download & Install

            1. Download `Loca-macos-arm64.dmg`
            2. Open the DMG and drag **Loca.app** to **Applications**
            3. Launch Loca — it sets up its Python environment automatically on first run (~1 min)

            > **First launch:** macOS Gatekeeper will warn "Developer cannot be verified" because this is an ad-hoc signed build (no paid Apple Developer ID). Right-click → Open → Open to bypass it once.

            ### Prerequisites
            - Apple Silicon Mac (M1 / M2 / M3 / M4)
            - Python 3 (`brew install python@3.12` recommended)
            - For MLX models: `pip install mlx-lm`
            - For GGUF models: `brew install llama.cpp`
          files: Loca-macos-arm64.dmg
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
