name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff mypy types-PyYAML -r requirements.txt

      - name: ruff check
        run: ruff check src/ tests/

      - name: mypy
        run: mypy src/ --ignore-missing-imports --no-strict-optional

  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Run tests
        run: |
          pytest tests/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            -v \
            --ignore=tests/test_tools.py  # network tests skipped in CI

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  swift-build:
    name: Swift build (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build SwiftUI package
        run: |
          cd Loca-SwiftUI
          swift build 2>&1
